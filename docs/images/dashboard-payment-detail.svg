<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="title">PayCart dashboard — payment detail panel showing a partially refunded payment</title>
  <desc id="desc">Screenshot of the PayCart dashboard payment detail panel for payment pay_01HABCDEF12345. The status badge reads "Partially refunded". The Refunds subsection lists one refund: rfd_01HXYZ7890ABCDEF for €25.00 EUR with status Succeeded, dated 2026-04-12. The Remaining refundable amount is €75.00 EUR.</desc>

