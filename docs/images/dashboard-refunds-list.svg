  <line x1="252" y1="302" x2="1176" y2="302" stroke="#e1e3ec"/>
  <text x="270" y="334" font-size="13" fill="#2c4ea1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rfd_01HXYZ7890ABCDEF</text>
  <text x="486" y="334" font-size="13" fill="#2c4ea1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">pay_01HABCDEF12345</text>
