<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="title">PayCart dashboard — Refunds list filtered to a single refund</title>
  <desc id="desc">Screenshot of the PayCart dashboard at Payments greater-than Refunds. The search field contains the refund ID rfd_01HXYZ7890ABCDEF. The table has one row: rfd_01HXYZ7890ABCDEF linked to payment pay_01HABCDEF12345, amount minus €25.00 EUR, status Succeeded (green badge), created 2026-04-12 09:41 UTC, updated 2026-04-12 09:41 UTC. The header shows breadcrumb Payments greater-than Refunds and a result count of 1 of 1.</desc>

