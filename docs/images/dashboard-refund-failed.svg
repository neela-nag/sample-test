<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="title">PayCart dashboard — Refund detail panel showing a card_declined failure</title>
  <desc id="desc">Screenshot of the PayCart dashboard refund detail page for refund rfd_01HFAILED99XYZ. The status badge reads "Failed" in red. A red alert banner shows failure_code "card_declined" with the message "The issuing bank rejected the credit attempt. Usually a closed card." The refund was for minus €40.00 EUR against payment pay_01HABCDEF12345, created 2026-05-04 14:22 UTC and updated 2026-05-04 14:22 UTC. The Remedy callout suggests contacting the customer to refund via an alternative method.</desc>

  <!-- Window chrome -->
  <rect x="0" y="0" width="1200" height="720" fill="#f5f6fa"/>
  <rect x="0" y="0" width="1200" height="44" fill="#e6e8ee"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="22" r="6" fill="#febc2e"/>
  <circle cx="62" cy="22" r="6" fill="#28c840"/>
  <rect x="220" y="12" width="760" height="22" rx="4" fill="#ffffff" stroke="#cfd2da" stroke-width="1"/>
  <text x="234" y="28" font-size="12" fill="#5b6172">https://dashboard.paycart.example/refunds/rfd_01HFAILED99XYZ</text>

  <!-- Sidebar -->
  <rect x="0" y="44" width="220" height="676" fill="#1f2440"/>
  <text x="24" y="84" font-size="16" font-weight="700" fill="#ffffff">PayCart</text>
  <text x="24" y="130" font-size="11" fill="#8b91ad" letter-spacing="1">DASHBOARD</text>
  <text x="24" y="158" font-size="13" fill="#c8ccdb">Home</text>
  <text x="24" y="190" font-size="11" fill="#8b91ad" letter-spacing="1">PAYMENTS</text>
  <text x="28" y="220" font-size="13" fill="#c8ccdb">Payments</text>
  <rect x="14" y="234" width="192" height="30" rx="4" fill="#2a3060"/>
  <text x="28" y="254" font-size="13" fill="#ffffff" font-weight="600">Refunds</text>
  <text x="28" y="280" font-size="13" fill="#c8ccdb">Disputes</text>
  <text x="24" y="316" font-size="11" fill="#8b91ad" letter-spacing="1">REPORTS</text>
  <text x="28" y="344" font-size="13" fill="#c8ccdb">Ledger</text>
  <text x="28" y="370" font-size="13" fill="#c8ccdb">Exports</text>

  <!-- Breadcrumb -->
  <text x="252" y="92" font-size="13" fill="#7b8198">Payments  ›  Refunds  ›  rfd_01HFAILED99XYZ</text>

  <!-- Header row -->
  <text x="252" y="134" font-size="24" font-weight="700" fill="#1f2440">−€40.00 EUR</text>
  <rect x="430" y="114" width="84" height="26" rx="13" fill="#fdecec" stroke="#c44747" stroke-width="1"/>
  <circle cx="446" cy="127" r="3" fill="#a82929"/>
  <text x="455" y="131" font-size="12" font-weight="600" fill="#a82929">Failed</text>
  <text x="252" y="158" font-size="13" fill="#5b6172">rfd_01HFAILED99XYZ · linked to pay_01HABCDEF12345 · 2026-05-04 14:22 UTC</text>

  <!-- Failure alert banner -->
  <rect x="252" y="184" width="924" height="92" rx="6" fill="#fdecec" stroke="#c44747" stroke-width="1"/>
  <circle cx="280" cy="214" r="11" fill="#c44747"/>
  <text x="280" y="219" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">!</text>

  <text x="304" y="212" font-size="13" font-weight="700" fill="#7a1f1f">Refund failed — failure_code: <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">card_declined</tspan></text>
  <text x="304" y="234" font-size="13" fill="#7a1f1f">The issuing bank rejected the credit attempt. Usually a closed card.</text>
  <text x="304" y="256" font-size="13" fill="#7a1f1f">No funds moved. The customer's payment method has not been credited.</text>

  <!-- Detail two-column layout: left = facts, right = remedy -->
  <text x="252" y="310" font-size="14" font-weight="700" fill="#1f2440">Refund details</text>
  <rect x="252" y="324" width="556" height="220" rx="6" fill="#ffffff" stroke="#e1e3ec" stroke-width="1"/>

  <!-- Left card rows -->
  <text x="270" y="354" font-size="12" fill="#7b8198">Refund ID</text>
  <text x="540" y="354" font-size="13" fill="#1f2440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rfd_01HFAILED99XYZ</text>

  <line x1="270" y1="366" x2="790" y2="366" stroke="#eef0f5"/>
  <text x="270" y="390" font-size="12" fill="#7b8198">Linked payment</text>
  <text x="540" y="390" font-size="13" fill="#2c4ea1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">pay_01HABCDEF12345</text>

  <line x1="270" y1="402" x2="790" y2="402" stroke="#eef0f5"/>
  <text x="270" y="426" font-size="12" fill="#7b8198">Amount</text>
  <text x="540" y="426" font-size="13" font-weight="600" fill="#b13a3a">−€40.00 EUR</text>

  <line x1="270" y1="438" x2="790" y2="438" stroke="#eef0f5"/>
  <text x="270" y="462" font-size="12" fill="#7b8198">Status</text>
  <text x="540" y="462" font-size="13" font-weight="600" fill="#a82929">Failed</text>

  <line x1="270" y1="474" x2="790" y2="474" stroke="#eef0f5"/>
  <text x="270" y="498" font-size="12" fill="#7b8198">failure_code</text>
  <text x="540" y="498" font-size="13" fill="#1f2440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">card_declined</text>

  <line x1="270" y1="510" x2="790" y2="510" stroke="#eef0f5"/>
  <text x="270" y="534" font-size="12" fill="#7b8198">Created · Updated</text>
  <text x="540" y="534" font-size="13" fill="#5b6172">2026-05-04 14:22 UTC</text>

  <!-- Right column: remedy callout -->
  <text x="824" y="310" font-size="14" font-weight="700" fill="#1f2440">Recommended next step</text>
  <rect x="824" y="324" width="352" height="220" rx="6" fill="#fff8e6" stroke="#e0a23a" stroke-width="1"/>
  <text x="844" y="354" font-size="13" font-weight="700" fill="#7a4f00">Contact the customer.</text>
  <text x="844" y="380" font-size="12" fill="#7a4f00">The card on file cannot accept the credit.</text>
  <text x="844" y="402" font-size="12" fill="#7a4f00">Issue the refund via an alternative method:</text>
  <text x="858" y="426" font-size="12" fill="#7a4f00">•  ACH bank transfer</text>
  <text x="858" y="446" font-size="12" fill="#7a4f00">•  Store credit</text>
  <text x="858" y="466" font-size="12" fill="#7a4f00">•  Manual check</text>
  <text x="844" y="498" font-size="12" fill="#7a4f00">Do not retry — the refund is in a terminal</text>
  <text x="844" y="514" font-size="12" fill="#7a4f00">state. A retry would create a duplicate.</text>

  <!-- Footer link -->
  <rect x="252" y="572" width="924" height="48" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="272" y="601" font-size="13" fill="#1f2440">See the troubleshooting guide for </text>
  <text x="510" y="601" font-size="13" font-weight="600" fill="#2c4ea1">all failure_code values</text>
  <text x="654" y="601" font-size="13" fill="#1f2440">→ when each requires a retry vs. customer contact.</text>
</svg>
